name: CI — build check

# Builds the site on every push to main and on pull requests, so broken
# templates/content are caught before Cloudflare Pages deploys. No secrets,
# no deployment (Cloudflare Pages handles deploys via its Git integration).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.162.0"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
