################ Greek language (default) ##################
[el]
label = "ΕΛ"
locale = "el-gr"
contentDir = "content/greek"
weight = 1

################ English language ##################
[en]
label = "EN"
locale = "en-us"
contentDir = "content/english"
weight = 2

  # English overrides of root params.toml values.
  [en.params]
  copyright = "© X-TRANS Ltd — International Transport & Logistics"

  # English overrides of the Greek root [company] block (params.toml).
  # Phone, fax, email and map coordinates are inherited from the root.
  [en.params.company]
  street = "Street 3, No. 1111, Block 11, P.O. Box 3118"
  city = "Schistos Industrial Park"
  country_name = "Greece"
  hours = "Monday–Friday, 08:00–17:00 (EET, UTC+2)"
